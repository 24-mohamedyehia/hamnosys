<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Subtle Dot Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.05" />
    </pattern>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="300" fill="url(#bg)" />
  <rect width="1200" height="300" fill="url(#grid)" />

  <!-- Left Side: HamNoSys Symbols (Based on provided image) -->
  <g transform="translate(180, 150)" opacity="0.9" filter="url(#glow)">
    
    <!-- 1. Handshape symbol: the loop with a top bar (Initial Configuration) -->
    <g transform="translate(-100, -40)" stroke="#38bdf8" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="0" y1="0" x2="35" y2="0" />
      <path d="M 5,15 C 25,10 45,35 25,50 C 5,60 -10,35 5,15 Z" />
    </g>

    <!-- 2. Location symbol: the filled trapezoid (bucket shape) -->
    <g transform="translate(-10, -50)">
       <polygon points="0,0 40,0 30,35 10,35" fill="#818cf8" />
       <!-- Cutout effect to mimic the middle line -->
       <line x1="-5" y1="18" x2="45" y2="18" stroke="#1e1b4b" stroke-width="5" />
    </g>

    <!-- 3. Action/Movement: the diagonal downward arrow with a square -->
    <g transform="translate(-50, 45)" stroke="#c084fc" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
       <line x1="35" y1="-10" x2="0" y2="25" />
       <polyline points="0,5 0,25 20,25" />
       <!-- Small square block -->
       <rect x="30" y="10" width="10" height="10" fill="#c084fc" stroke="none" />
       <line x1="-15" y1="25" x2="-35" y2="25" />
    </g>

    <!-- 4. NMF (Non-Manual Features): Eyebrows curve and Upward Arrow -->
    <g transform="translate(60, 20)" stroke="#38bdf8" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
       <path d="M 0,20 Q 15,5 30,20" />
       <line x1="45" y1="25" x2="45" y2="-5" />
       <polyline points="35,5 45,-5 55,5" />
    </g>

  </g>

  <!-- Flow Lines Connecting Left (Notation) to Right (Integration) -->
  <g opacity="0.4">
    <path d="M 320 150 C 450 50, 750 50, 920 150" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="12 8" />
    <path d="M 320 150 C 450 250, 750 250, 900 150" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="12 8" />
    <path d="M 320 150 C 600 150, 600 150, 910 150" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5" />
    
    <!-- Animated-looking pulse on the line -->
    <circle cx="450" cy="116" r="4" fill="#38bdf8" filter="url(#glow)"/>
    <circle cx="750" cy="184" r="4" fill="#c084fc" filter="url(#glow)"/>
  </g>

  <!-- Right Side: XML Brackets Representing Code / Processing -->
  <g transform="translate(1020, 150)" opacity="0.9">
    <text x="0" y="25" font-family="monospace, Consolas, Courier New" font-size="70" font-weight="bold" fill="url(#accent)" text-anchor="middle" filter="url(#glow)">&lt;/&gt;</text>
  </g>

  <!-- Center Typography -->
  <g transform="translate(600, 145)">
    <!-- Main Title -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3">hamnosys</text>
    
    <!-- Subtitle (More General) -->
    <text x="0" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="1">Advanced Toolkit for Sign Language Notation</text>
  </g>

</svg>